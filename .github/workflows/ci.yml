name: CI

on:
  pull_request:
    branches: [2.0]
  push:
    branches: [2.0]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mewmo
          POSTGRES_PASSWORD: mewmo
          POSTGRES_DB: mewmo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mewmo -d mewmo_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://mewmo:mewmo@localhost:5432/mewmo_dev
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

      - run: pnpm test
        env:
          DATABASE_URL: postgresql://mewmo:mewmo@localhost:5432/mewmo_dev
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: ci-test-secret
