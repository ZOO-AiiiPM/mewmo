name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://mewmo:mewmo@localhost:5432/mewmo_dev
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY: ci-openai-api-key
      ANTHROPIC_API_KEY: ci-anthropic-api-key
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      R2_ACCESS_KEY: ci-r2-access-key
      R2_SECRET_KEY: ci-r2-secret-key
      R2_BUCKET: mewmo-ci
      R2_PUBLIC_BASE_URL: https://cdn.mewmo.test
      RESEND_API_KEY: ci-resend-api-key
      EMAIL_FROM: Mewmo <login@mewmo.app>
      TZ: Asia/Shanghai

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mewmo
          POSTGRES_PASSWORD: mewmo
          POSTGRES_DB: mewmo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mewmo -d mewmo_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm lint

      - run: pnpm build

      # API integration files require a running Web server and a seeded test user.
      # CI runs the self-contained suites until that harness is provisioned here.
      - run: pnpm exec tsx --test $(find tests -name '*.test.mjs' ! -name 'clips-api.test.mjs' ! -name 'feeds-api.test.mjs' ! -name 'notes-api.test.mjs' ! -name 'sync-api.test.mjs')

      - run: pnpm exec vitest run tests/unit/*.test.ts

      - run: pnpm exec turbo run test
