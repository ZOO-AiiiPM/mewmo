name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://mewmo:mewmo@localhost:5432/mewmo_dev
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      OPENAI_API_KEY: ci-openai-api-key
      ANTHROPIC_API_KEY: ci-anthropic-api-key
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      R2_ACCESS_KEY: ci-r2-access-key
      R2_SECRET_KEY: ci-r2-secret-key
      R2_BUCKET: mewmo-ci
      R2_PUBLIC_BASE_URL: https://cdn.mewmo.test
      RESEND_API_KEY: ci-resend-api-key
      EMAIL_FROM: Mewmo <login@mewmo.app>
      TZ: Asia/Shanghai

    services:
      postgres:
        # ZOO-64: pgvector 镜像提供 vector 扩展（pg_trgm 为 contrib 已内置），
        # 否则迁移中的 CREATE EXTENSION vector 会失败。
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: mewmo
          POSTGRES_PASSWORD: mewmo
          POSTGRES_DB: mewmo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mewmo -d mewmo_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test:unit

      - run: pnpm test:theme
        env:
          THEME_COLOR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
