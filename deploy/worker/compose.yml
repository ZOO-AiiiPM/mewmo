name: mewmo-worker

services:
  worker:
    build:
      context: ../..
      dockerfile: deploy/worker/Dockerfile
    env_file:
      - ${WORKER_ENV_FILE:-.env.worker}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
